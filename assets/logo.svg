<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48" role="img" aria-label="PHALENDROME SOLUTIONS logo">
  <defs>
    <style>
      .logo-primary { fill: #2563EB; }
      .logo-secondary { fill: #1e40af; }
      .logo-text { font-family: 'Inter', Arial, sans-serif; }
    </style>
  </defs>
  
  <!-- Palindromic mark (medium-small-large-small-medium) -->
  <g>
    <rect x="6" y="12" width="3" height="24" class="logo-primary" rx="1.5"/>
    <rect x="14" y="18" width="3" height="12" class="logo-primary" rx="1.5"/>
    <rect x="22" y="6" width="3" height="36" class="logo-secondary" rx="1.5"/>
    <rect x="30" y="18" width="3" height="12" class="logo-primary" rx="1.5"/>
    <rect x="38" y="12" width="3" height="24" class="logo-primary" rx="1.5"/>
    
    <!-- Text: Company name -->
    <text x="44" y="26" font-size="13" font-weight="600" class="logo-text logo-primary">PHALENDROME</text>
    
    <!-- Text: Tagline -->
    <text x="44" y="40" font-size="9" font-weight="400" class="logo-text logo-secondary">SOLUTIONS</text>
  </g>
</svg>